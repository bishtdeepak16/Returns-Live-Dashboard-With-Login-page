<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BOUNCE — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#F59E0B;--accent2:#f97316;
  --bg:#09090f;--bg2:#111118;--bg3:#181820;--bg4:#1f1f2a;
  --border:#2a2a3a;--text:#f0f0f8;--text2:#9898b8;--text3:#555570;
  --green:#22c55e;--red:#ef4444;
  --font-ui:'Outfit',sans-serif;--font-mono:'DM Mono',monospace;
}
html,body{height:100%;min-height:100vh}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-ui);
  display:flex;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(245,158,11,.08),transparent);
}

/* ── CARD ── */
.card{
  width:420px;max-width:94vw;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:40px 36px 36px;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(245,158,11,.04) 0%,transparent 60%);
  pointer-events:none;
}

/* ── LOGO ── */
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.logo-icon{
  width:46px;height:46px;border-radius:11px;flex-shrink:0;overflow:hidden;
  box-shadow:0 4px 20px rgba(245,158,11,.45);
}
.logo-icon img{width:100%;height:100%;object-fit:cover}
.logo-title-wrap{
  display:inline-flex;align-items:center;
  background:linear-gradient(105deg,#f97316 0%,#F59E0B 45%,#ea580c 100%);
  border-radius:9px;padding:0 18px 0 12px;height:44px;
}
.logo-title{
  font-size:1.45rem;font-weight:900;color:#fff;letter-spacing:-.01em;
  font-family:var(--font-ui);
}
.logo-sub{font-size:.78rem;color:var(--text3);margin-top:2px;font-weight:500;letter-spacing:.04em}

/* ── WELCOME ── */
.welcome{margin-bottom:26px}
.welcome h2{font-size:1.25rem;font-weight:700;color:var(--text);margin-bottom:4px}
.welcome p{font-size:.83rem;color:var(--text2)}

/* ── FORM ── */
.field{margin-bottom:16px}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.03em;text-transform:uppercase}
.field-wrap{position:relative}
.field input{
  width:100%;padding:11px 14px;
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-size:.9rem;font-family:var(--font-ui);
  outline:none;transition:border-color .18s,box-shadow .18s;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
.field input::placeholder{color:var(--text3)}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text3);
  padding:4px;line-height:1;transition:color .15s;
}
.eye-btn:hover{color:var(--text2)}

/* ── SUBMIT ── */
.btn-submit{
  width:100%;padding:12px;margin-top:8px;
  background:linear-gradient(105deg,#f97316,#F59E0B);
  color:#0a0a0a;border:none;border-radius:10px;
  font-size:.95rem;font-weight:800;font-family:var(--font-ui);
  cursor:pointer;transition:opacity .18s,transform .12s;
  letter-spacing:.01em;
}
.btn-submit:hover:not(:disabled){opacity:.92;transform:translateY(-1px)}
.btn-submit:active:not(:disabled){transform:translateY(0)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.btn-submit .spinner{
  display:inline-block;width:15px;height:15px;
  border:2px solid rgba(0,0,0,.3);border-top-color:#000;
  border-radius:50%;animation:spin .55s linear infinite;
  vertical-align:middle;margin-right:7px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MESSAGES ── */
.msg{
  margin-top:14px;padding:11px 14px;border-radius:9px;
  font-size:.83rem;display:none;font-weight:500;
}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac}
.msg.info{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);color:#93c5fd}

/* ── FOOTER ── */
.card-footer{margin-top:24px;text-align:center;font-size:.75rem;color:var(--text3)}
.role-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;font-size:.7rem;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;
}
.role-pill.ptc{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
.role-pill.fc{background:rgba(96,165,250,.12);color:#93c5fd;border:1px solid rgba(96,165,250,.2)}
.role-pill.viewer{background:rgba(167,139,250,.12);color:#c4b5fd;border:1px solid rgba(167,139,250,.2)}

/* Loading overlay */
.loading-overlay{
  position:fixed;inset:0;background:rgba(9,9,15,.85);
  display:none;align-items:center;justify-content:center;
  z-index:999;flex-direction:column;gap:14px;
}
.loading-overlay.show{display:flex}
.loading-overlay .big-spinner{
  width:40px;height:40px;
  border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;
}
.loading-overlay p{color:var(--text2);font-size:.85rem}

/* ═══════════════════════════════════════════════════════════════
   ✦ BOUNCE UI 2.0 — LOGIN "WARM GLASS" LAYER (pure CSS)
═══════════════════════════════════════════════════════════════ */
:root{
  --bg:#0c0a08;--bg2:#161310;--bg3:#1e1a15;--bg4:#28221a;
  --border:#352d22;--text:#f7f2e9;--text2:#b3a794;--text3:#7a6f5d;
}

/* Ambient stage: warm night + two drifting amber auroras + faint dot grid */
body{
  background:
    radial-gradient(1000px 520px at 50% -12%, rgba(245,158,11,.13), transparent 62%),
    radial-gradient(700px 500px at 100% 110%, rgba(249,115,22,.07), transparent 60%),
    #0c0a08;
  position:relative;
}
body::before, body::after{
  content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  filter:blur(90px);opacity:.5;
}
body::before{
  width:560px;height:560px;left:-160px;top:-180px;
  background:radial-gradient(circle at 35% 35%, rgba(245,158,11,.34), rgba(249,115,22,.12) 55%, transparent 72%);
  animation:auroraA 22s ease-in-out infinite alternate;
}
body::after{
  width:520px;height:520px;right:-180px;bottom:-200px;
  background:radial-gradient(circle at 60% 60%, rgba(249,115,22,.26), rgba(245,158,11,.10) 55%, transparent 72%);
  animation:auroraB 26s ease-in-out infinite alternate;
}
@keyframes auroraA{from{transform:translate(0,0) scale(1)}to{transform:translate(90px,60px) scale(1.12)}}
@keyframes auroraB{from{transform:translate(0,0) scale(1.08)}to{transform:translate(-70px,-50px) scale(.96)}}

::selection{background:rgba(245,158,11,.30);color:var(--text)}

/* Card: warm glass with luminous top edge + gentle entrance */
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
.card{
  z-index:1;
  border-radius:22px;
  padding:44px 40px 38px;
  background:linear-gradient(180deg,rgba(255,255,255,.045),transparent 45%),rgba(22,19,16,.82);
  border:1px solid rgba(245,158,11,.16);
  box-shadow:
    0 30px 90px rgba(0,0,0,.65),
    0 0 60px rgba(245,158,11,.07),
    inset 0 1px 0 rgba(255,255,255,.07);
  backdrop-filter:blur(18px);
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
.card::before{
  background:linear-gradient(150deg,rgba(245,158,11,.07) 0%,transparent 55%);
}
.card::after{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,158,11,.75),rgba(249,115,22,.55),transparent);
  filter:drop-shadow(0 0 8px rgba(245,158,11,.6));
}

/* Logo lockup */
.logo{margin-bottom:34px}
.logo-icon{
  border-radius:13px;
  box-shadow:0 8px 28px rgba(245,158,11,.5), 0 0 0 1px rgba(255,255,255,.12) inset;
}
.logo-title-wrap{
  border-radius:11px;
  box-shadow:0 6px 24px rgba(245,158,11,.38), inset 0 1px 0 rgba(255,255,255,.35), inset 0 -1px 0 rgba(0,0,0,.18);
}

/* Welcome copy */
.welcome{margin-bottom:30px}
.welcome h2{font-size:1.35rem;letter-spacing:-.015em}
.welcome p{color:var(--text2)}

/* Fields: warm wells with amber focus bloom */
.field{margin-bottom:18px}
.field label{color:var(--text3);letter-spacing:.06em}
.field input{
  padding:12px 15px;border-radius:12px;
  background:rgba(12,10,8,.55);
  border:1.5px solid var(--border);
  box-shadow:inset 0 2px 6px rgba(0,0,0,.35);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.field input:hover{border-color:rgba(245,158,11,.32)}
.field input:focus{
  border-color:var(--accent);
  background:rgba(18,14,10,.7);
  box-shadow:inset 0 2px 6px rgba(0,0,0,.3), 0 0 0 4px rgba(245,158,11,.14), 0 0 24px rgba(245,158,11,.10);
}
.eye-btn:hover{color:var(--accent)}
input:focus-visible, button:focus-visible{outline:2px solid rgba(245,158,11,.7);outline-offset:2px;border-radius:10px}

/* Submit: gradient, inner highlight, hover sheen sweep */
.btn-submit{
  position:relative;overflow:hidden;
  margin-top:12px;padding:13px;
  border-radius:12px;
  background:linear-gradient(115deg,#f97316 0%,#F59E0B 55%,#fbbf24 110%);
  box-shadow:0 8px 26px rgba(245,158,11,.38), inset 0 1px 0 rgba(255,255,255,.4), inset 0 -1px 0 rgba(0,0,0,.2);
  transition:transform .15s ease, box-shadow .2s ease, filter .2s ease;
}
.btn-submit::after{
  content:'';position:absolute;top:0;bottom:0;left:-70%;width:45%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.45),transparent);
  transform:skewX(-18deg);transition:left .5s ease;
}
.btn-submit:hover:not(:disabled){opacity:1;transform:translateY(-2px);filter:brightness(1.05);box-shadow:0 14px 34px rgba(245,158,11,.5), inset 0 1px 0 rgba(255,255,255,.4)}
.btn-submit:hover:not(:disabled)::after{left:130%}
.btn-submit:active:not(:disabled){transform:translateY(0)}

/* Messages & footer */
.msg{border-radius:11px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.card-footer{margin-top:28px;letter-spacing:.03em;opacity:.85}

/* Loading overlay: warm veil */
.loading-overlay{background:rgba(10,8,6,.86);backdrop-filter:blur(6px)}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

/* ── TITLE LOCKUP FIX + TYPE POLISH ── */
.logo{flex-wrap:nowrap}
.logo-title-wrap{
  height:auto;min-height:44px;padding:9px 20px;
  border-radius:12px;white-space:nowrap;
}
.logo-title{
  font-family:'Sora','Outfit',sans-serif;
  font-size:1.08rem;font-weight:800;letter-spacing:.04em;
  white-space:nowrap;line-height:1.2;
}
.logo-icon{width:44px;height:44px}
.welcome{text-align:center}
.welcome h2{font-family:'Sora','Outfit',sans-serif;font-weight:700}
.btn-submit{font-family:'Sora','Outfit',sans-serif;letter-spacing:.02em}
@media (max-width:420px){
  .logo-title{font-size:.92rem}
  .card{padding:36px 26px 32px}
}

/* ── PREMIUM PASS v2: centered lockup + elevated composition ── */

/* New lockup: icon (bigger, glowing) → Losung360 → title, all stacked+centered */
.brand-lockup{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  margin-bottom:8px;
}
.brand-icon-img{
  height:72px;width:auto;object-fit:contain;flex-shrink:0;
  border-radius:12px;
  filter:drop-shadow(0 10px 22px rgba(245,158,11,.5));
  animation:emblemFloat 5s ease-in-out infinite;
}
.brand-losung-img{
  height:34px;object-fit:contain;border-radius:6px;
  filter:drop-shadow(0 4px 14px rgba(245,158,11,.3));
}

/* Lockup becomes a centered vertical emblem */
.logo{
  flex-direction:column;
  align-items:center;
  gap:16px;
  margin-bottom:8px;
}
.logo > img{
  width:60px!important;height:60px!important;
  border-radius:16px!important;
  box-shadow:0 10px 32px rgba(245,158,11,.45), 0 0 0 1px rgba(245,158,11,.25), inset 0 0 0 1px rgba(255,255,255,.1);
  animation:emblemFloat 5s ease-in-out infinite;
}
@keyframes emblemFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.logo > div{justify-content:center}
.logo-title-wrap{
  position:relative;overflow:hidden;
  min-height:46px;padding:11px 26px;
  border-radius:99px;
  box-shadow:0 8px 26px rgba(245,158,11,.42), inset 0 1px 0 rgba(255,255,255,.4), inset 0 -1px 0 rgba(0,0,0,.18);
}
.logo-title-wrap::after{
  content:'';position:absolute;top:0;bottom:0;left:-80%;width:50%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.5),transparent);
  transform:skewX(-18deg);
  animation:pillSheen 4.5s ease-in-out infinite;
}
@keyframes pillSheen{0%,55%{left:-80%}75%,100%{left:140%}}
.logo-title{font-size:1.02rem;letter-spacing:.12em;text-transform:uppercase}

/* Losung360 mark breathing room */
.card > div:first-of-type{margin-bottom:28px!important}
.card > div:first-of-type img{
  filter:drop-shadow(0 4px 14px rgba(245,158,11,.3));
}

/* hairline divider + refined welcome hierarchy */
.welcome{position:relative;padding-top:22px;margin-bottom:32px}
.welcome::before{
  content:'';position:absolute;top:0;left:22%;right:22%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,158,11,.4),transparent);
}
.welcome h2{
  font-size:1.5rem;letter-spacing:-.02em;margin-bottom:7px;
  background:linear-gradient(180deg,#fdfaf4,#d9cdb6);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
.welcome p{font-size:.85rem;letter-spacing:.01em}

/* inputs: taller, calmer, more premium */
.field{margin-bottom:20px}
.field label{font-size:.72rem;letter-spacing:.14em;margin-bottom:8px;color:#8d8168}
.field input{
  padding:13.5px 16px;
  font-size:.94rem;
  border-radius:13px;
}
.field input::placeholder{color:#5c5342}

/* submit: taller, statement piece */
.btn-submit{
  margin-top:16px;padding:14.5px;
  border-radius:13px;font-size:1rem;letter-spacing:.03em;
}

/* footer: quiet lockplate */
.card-footer{
  position:relative;margin-top:32px;padding-top:18px;
  font-size:.72rem;letter-spacing:.08em;color:#6d6350;
}
.card-footer::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,158,11,.22),transparent);
}

/* card: a touch wider + inner glow floor */
.card{width:440px;padding:44px 42px 36px}
.card::before{
  background:
    radial-gradient(420px 200px at 50% 108%, rgba(245,158,11,.07), transparent 70%),
    linear-gradient(150deg,rgba(245,158,11,.07) 0%,transparent 55%);
}
@media (max-width:460px){.card{padding:38px 26px 30px}}

/* ── FIT PASS: compact rhythm for 100% zoom on 1080p ── */
body{padding:28px 0;align-items:center}
.card{
  width:430px;
  padding:30px 38px 26px;
  max-height:none;
}
.card > div:first-of-type{margin-bottom:18px!important}
.card > div:first-of-type img{height:34px!important}
.logo{gap:11px;margin-bottom:4px}
.logo > img{
  width:46px!important;height:46px!important;
  border-radius:13px!important;
  animation:none;
}
.logo-title-wrap{min-height:38px;padding:8px 20px}
.logo-title{font-size:.9rem;letter-spacing:.11em}
.welcome{padding-top:14px;margin-bottom:22px}
.welcome h2{font-size:1.3rem;margin-bottom:5px}
.welcome p{font-size:.8rem}
.field{margin-bottom:14px}
.field label{margin-bottom:6px}
.field input{padding:11.5px 15px;font-size:.9rem;border-radius:12px}
.btn-submit{margin-top:10px;padding:12.5px;font-size:.95rem;border-radius:12px}
.card-footer{margin-top:20px;padding-top:13px;font-size:.68rem}
.msg{margin-top:10px;padding:9px 13px}

/* buttery interactions */
.field input,.eye-btn,.btn-submit{
  transition:
    background-color .22s cubic-bezier(.4,0,.2,1),
    border-color .22s cubic-bezier(.4,0,.2,1),
    color .22s cubic-bezier(.4,0,.2,1),
    box-shadow .25s cubic-bezier(.4,0,.2,1),
    transform .18s cubic-bezier(.34,1.45,.64,1);
}
.btn-submit:active:not(:disabled){transform:scale(.97)}

@media (max-height:820px){
  .card{padding:24px 34px 22px}
  .card > div:first-of-type{margin-bottom:12px!important}

}
/* ── Final title-size bump (icon-first lockup) ── */
.logo-title{font-size:1.12rem!important;letter-spacing:.1em;text-transform:uppercase}
.brand-lockup{margin-bottom:6px}
.welcome{padding-top:10px}
</style>

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

async function sbGet(path) {
  const r = await fetch(`${SB_URL}${path}`, { headers: HDRS });
  if (!r.ok) { const t = await r.text(); throw new Error(`${r.status}: ${t.slice(0,200)}`); }
  return r.json();
}

async function sbPost(path, body) {
  const r = await fetch(`${SB_URL}${path}`, {
    method: 'POST', headers: HDRS, body: JSON.stringify(body)
  });
  if (!r.ok) { const t = await r.text(); throw new Error(`${r.status}: ${t.slice(0,200)}`); }
  return r.json();
}

function genToken() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let t = '';
  for (let i = 0; i < 64; i++) t += chars[Math.floor(Math.random() * chars.length)];
  return `${t}_${Date.now()}`;
}

/* ═══════════════════════════════════════════
   RESOLVE IDs → NAMES via Supabase lookup tables
   Tries multiple possible table names
═══════════════════════════════════════════ */
async function resolveFcIds(fcIds) {
  if (!fcIds || !fcIds.length) return {};
  const idList = fcIds.map(id => `"${id}"`).join(',');
  
  // Try known possible table names for FC master
  const tableOptions = ['fulfillment_centers','fc_master','fc_config','fcs','fc'];
  for (const tbl of tableOptions) {
    try {
      const rows = await sbGet(`/rest/v1/${tbl}?fc_id=in.(${fcIds.join(',')})&select=fc_id,fc_code,fc_name`);
      if (Array.isArray(rows) && rows.length > 0) {
        const map = {};
        rows.forEach(r => { map[r.fc_id] = { fc_code: r.fc_code, fc_name: r.fc_name || r.fc_code }; });
        return map;
      }
    } catch(e) { /* try next */ }
  }
  
  // Fallback: try to get fc_code from fc_id via vw_shipment_report
  // (not ideal but works if fc_id is available in the view)
  try {
    const rows = await sbGet(`/rest/v1/vw_shipment_report?select=fc_code,fc_id&limit=5000`);
    if (Array.isArray(rows)) {
      const map = {};
      rows.forEach(r => { if (r.fc_id && r.fc_code) map[r.fc_id] = { fc_code: r.fc_code, fc_name: r.fc_code }; });
      if (Object.keys(map).length > 0) return map;
    }
  } catch(e) {}

  // Last resort: return fc_ids as placeholder codes
  console.warn('⚠️ Could not resolve FC IDs to fc_codes. Check fulfillment_centers table name.');
  const map = {};
  fcIds.forEach((id, i) => { map[id] = { fc_code: `FC_${i+1}`, fc_name: id.slice(0,8) }; });
  return map;
}

async function resolveClientIds(clientIds) {
  if (!clientIds || !clientIds.length) return {};
  
  const tableOptions = ['clients','client_master','client_config','client'];
  for (const tbl of tableOptions) {
    try {
      const rows = await sbGet(`/rest/v1/${tbl}?client_id=in.(${clientIds.join(',')})&select=client_id,client_name`);
      if (Array.isArray(rows) && rows.length > 0) {
        const map = {};
        rows.forEach(r => { map[r.client_id] = r.client_name; });
        return map;
      }
    } catch(e) {}
  }
  
  // Try marketplace_config or similar
  const altOptions = ['marketplace_config','clients_config'];
  for (const tbl of altOptions) {
    try {
      const rows = await sbGet(`/rest/v1/${tbl}?client_id=in.(${clientIds.join(',')})&select=client_id,client_name`);
      if (Array.isArray(rows) && rows.length > 0) {
        const map = {};
        rows.forEach(r => { map[r.client_id] = r.client_name; });
        return map;
      }
    } catch(e) {}
  }

  console.warn('⚠️ Could not resolve client IDs. Check clients table name.');
  const map = {};
  clientIds.forEach((id, i) => { map[id] = `Client_${i+1}`; });
  return map;
}

/* ═══════════════════════════════════════════
   MAIN LOGIN HANDLER
═══════════════════════════════════════════ */
async function handleLogin() {
  clearMsgs();
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  if (!email || !password) { showErr('Please enter your email and password.'); return; }

  setLoading(true, 'Verifying credentials…');

  try {
    // 1. Hash password
    const hash = await sha256(password);

    // 2. Query users table
    const users = await sbGet(
      `/rest/v1/users?username=eq.${encodeURIComponent(email)}&password_hash=eq.${hash}&is_active=eq.true&select=user_id,email,username,full_name,role`
    );

    if (!users || users.length === 0) {
      setLoading(false);
      showErr('Invalid email or password. Please try again.');
      return;
    }

    const user = users[0];
    const { user_id, full_name, role } = user;
    const resolvedEmail = user.email || user.username || email;

    // 3. Build permission profile based on role
    let authProfile = {
      user_id, email: resolvedEmail, full_name, role,
      allowed_fc_codes: null,   // null = all access
      allowed_pairs: null,       // null = all access (for VIEWER, array of {fc_code, client_name})
      session_token: genToken(),
      login_time: new Date().toISOString()
    };

    if (role === 'FC_USER') {
      setLoading(true, 'Loading FC permissions…');

      // Get active FC mappings
      const mappings = await sbGet(
        `/rest/v1/user_fc_mapping?user_id=eq.${user_id}&is_active=eq.true&select=fc_id`
      );

      const fcIds = mappings.map(m => m.fc_id);
      if (fcIds.length === 0) {
        setLoading(false);
        showErr('Your account has no active FC assigned. Contact admin.');
        return;
      }

      // Resolve fc_ids to fc_codes
      setLoading(true, 'Resolving FC names…');
      const fcMap = await resolveFcIds(fcIds);
      authProfile.allowed_fc_codes = fcIds.map(id => fcMap[id]?.fc_code).filter(Boolean);
      authProfile.allowed_fc_names = fcIds.reduce((acc, id) => {
        const fc = fcMap[id];
        if (fc) acc[fc.fc_code] = fc.fc_name || fc.fc_code;
        return acc;
      }, {});

    } else if (role === 'VIEWER') {
      setLoading(true, 'Loading viewer permissions…');

      // Get active viewer access
      const access = await sbGet(
        `/rest/v1/user_viewer_access?user_id=eq.${user_id}&is_active=eq.true&select=fc_id,client_id`
      );

      if (access.length === 0) {
        setLoading(false);
        showErr('Your account has no active viewer access. Contact admin.');
        return;
      }

      // Resolve IDs
      setLoading(true, 'Resolving permissions…');
      const uniqueFcIds = [...new Set(access.map(a => a.fc_id))];
      const uniqueClientIds = [...new Set(access.map(a => a.client_id))];

      const [fcMap, clientMap] = await Promise.all([
        resolveFcIds(uniqueFcIds),
        resolveClientIds(uniqueClientIds)
      ]);

      authProfile.allowed_pairs = access.map(a => ({
        fc_id: a.fc_id,
        fc_code: fcMap[a.fc_id]?.fc_code || null,
        client_id: a.client_id,
        client_name: clientMap[a.client_id] || null
      })).filter(p => p.fc_code && p.client_name);

      // Also derive unique fc_codes for convenience
      authProfile.allowed_fc_codes = [...new Set(authProfile.allowed_pairs.map(p => p.fc_code))];

    }
    // PTC_USER: no restrictions, profile stays with null allowed_fc_codes

    // 4. Store auth in sessionStorage
    sessionStorage.setItem('bounce_auth', JSON.stringify(authProfile));
    sessionStorage.setItem('bounce_login_ts', Date.now().toString()); // 24h session timer

    // 5. Create session in user_sessions table (non-blocking)
    const expiresAt = new Date(Date.now() + 8 * 60 * 60 * 1000).toISOString(); // 8h
    sbPost('/rest/v1/user_sessions', {
      user_id,
      session_token: authProfile.session_token,
      expires_at: expiresAt,
      created_at: authProfile.login_time,
      last_activity: authProfile.login_time
    }).catch(() => {}); // non-critical

    // 6. Show success and redirect
    setLoading(false);
    const roleLabel = { PTC_USER: 'Full Access', FC_USER: 'FC User', VIEWER: 'Viewer' }[role] || role;
    showOk(`✓ Welcome, ${full_name}! Signing you in as ${roleLabel}…`);

    setTimeout(() => { window.location.href = DASH; }, 900);

  } catch (err) {
    setLoading(false);
    console.error('Login error:', err);
    showErr(`Login failed: ${err.message}`);
  }
}
